<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Smart Library</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--dark); color: white; height: 100vh; position: sticky; top: 0; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: var(--primary); }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; box-sizing: border-box; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        /* Header & Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 2rem; color: var(--dark); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #777; font-size: 0.75rem; text-transform: uppercase; }

        /* Badges & Roles */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .available { background: #e6f9ed; color: #2ecc71; }
        .borrowed { background: #fff1f0; color: #e74c3c; }
        .role-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .role-admin { background: #34495e; color: white; }
        .role-user { background: #3498db; color: white; }

        /* Modal Background */
        .modal { 
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.6); 
            z-index:1000; 
            justify-content:center; 
            align-items:center; 
            backdrop-filter: blur(3px);
        }

        /* Modal Content Box */
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 400px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content input, .modal-content select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .modal-content input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1); }

        .btn-modal { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.3s ease; display: block; width: 100%; margin-bottom: 10px; }
        .btn-save { background-color: var(--primary); color: white; }
        .btn-save:hover { background-color: #357abd; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3); }
        .btn-cancel { background-color: #eee; color: #555; }
        .btn-cancel:hover { background-color: #ddd; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Portal</h2>
    <div class="nav-item active" onclick="showTab('booksTab')">📚 Books Manager</div>
    <div class="nav-item" onclick="showTab('usersTab')">👥 Users Manager</div>
    <div class="nav-item" onclick="logout()" style="margin-top: 50px; background: #c0392b;">🚪 Logout</div>
</div>

<div class="main-content">
    <div class="stats-grid">
        <div class="stat-card"><h3 id="totalBooks">0</h3><p>Total Books</p></div>
        <div class="stat-card"><h3 id="totalBorrowed">0</h3><p>Currently Borrowed</p></div>
        <div class="stat-card"><h3 id="totalUsers">0</h3><p>Registered Users</p></div>
    </div>

    <div id="booksTab" class="tab-content">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Inventory Management</h2>
                <button class="btn-modal btn-save" style="width: auto; padding: 10px 20px;" onclick="openModal()">➕ Add New Book</button>
            </div>
            <table id="booksTable">
                <thead>
                    <tr>
                        <th>Book Details</th>
                        <th>Status</th>
                        <th>Borrowed By</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="usersTab" class="tab-content" style="display:none;">
        <div class="card">
            <h2>System Users Status</h2>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Books Count</th>
                        <th>Borrowed Titles</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-top: 0; color: var(--dark);">Edit Book</h2>
        <input type="hidden" id="editFlag">
        
        <input type="number" id="m_id" placeholder="Book ID (Number)">
        <input type="text" id="m_title" placeholder="Book Title">
        <input type="text" id="m_author" placeholder="Author Name">
        <input type="text" id="m_cats" placeholder="Categories (e.g. Tech, Fiction)">
        
        <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:#888;">Availability Status:</label>
        <select id="m_status" onchange="toggleUserSelect()">
            <option value="true">Available</option>
            <option value="false">Borrowed</option>
        </select>

        <div id="userSelectContainer" style="display:none; border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:var(--primary); font-weight: bold;">Assign to User:</label>
            <select id="m_borrower_id" style="margin-bottom: 0;">
                </select>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-modal btn-save" onclick="saveBook()">💾 Save Book Changes</button>
            <button class="btn-modal btn-cancel" onclick="closeModal()">❌ Cancel</button>
        </div>
    </div>
</div>

<script src="javascript.js"></script>
</body>
</html>
