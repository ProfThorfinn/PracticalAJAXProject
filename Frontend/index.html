<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management - Dashboard</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h2 { margin-top: 0; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:active { transform: scale(0.98); }

        .btn-add { background: var(--secondary); color: white; }
        .btn-update { background: var(--warning); color: white; }
        .btn-fetch { background: var(--primary); color: white; }
        .btn-delete { background: var(--danger); color: white; }

        #statusMsg {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--dark); color: white; font-weight: 500; }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-true { background: #d4edda; color: #155724; }
        .badge-false { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 My Smart Library</h1>
        <p>Backend & AJAX Demo - Developed by Mahmoud</p>
    </div>

    <div id="statusMsg"></div>

    <div class="card">
        <h2>Book Manager (Add / Edit)</h2>
        <div class="form-grid">
            <input type="number" id="bookId" placeholder="ID (e.g. 1)">
            <input type="text" id="bookTitle" placeholder="Book Title">
            <input type="text" id="bookAuthor" placeholder="Author">
            <input type="text" id="bookCats" placeholder="Cats (Sci-fi, Tech)">
            <select id="bookStatus">
                <option value="true">✅ Available</option>
                <option value="false">❌ Borrowed</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addBook()">➕ Add Book</button>
            <button class="btn-update" onclick="updateBook()">📝 Update</button>
            <button class="btn-fetch" onclick="getAllBooks()">🔄 Refresh List</button>
        </div>
    </div>

    <div class="card">
        <h2>Quick Actions (Search / Delete)</h2>
        <div class="form-grid" style="grid-template-columns: 1fr auto auto;">
            <input type="number" id="searchId" placeholder="Enter Book ID to Action...">
            <button class="btn-fetch" onclick="getOneBook()">🔍 Find Book</button>
            <button class="btn-delete" onclick="deleteBook()">🗑️ Delete</button>
        </div>
    </div>

    <div class="card" style="padding: 0;">
        <table id="libTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Categories</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="javascript.js"></script>
</body>
</html>
