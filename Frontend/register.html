<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Account</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #1e3c72; margin-bottom: 30px; font-size: 2rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: #1e3c72; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #27ae60; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #777; }
        .footer-link a { color: #1e3c72; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>🆕 Join Us</h2>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
            <label>Account Type</label>
            <select id="regRole">
                <option value="user">Reader (User)</option>
                <option value="admin">Librarian (Admin)</option>
            </select>
        </div>
        <button onclick="register()">Create Account</button>
        <div class="footer-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            if(!name || !email || !password) return alert("Fill all fields please!");

            const xhr = new XMLHttpRequest();
            xhr.open("POST", "/api/auth/register", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 201) {
                        alert("Account created! Go to login.");
                        window.location.href = "login.html";
                    } else {
                        alert("Error: Registration failed.");
                    }
                }
            };
            xhr.send(JSON.stringify({ name, email, password, role }));
        }
    </script>
</body>
</html>
