<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library | Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        .hero-section {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        h1 { font-size: 3.5rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        p { font-size: 1.2rem; margin-bottom: 40px; line-height: 1.6; opacity: 0.9; }
        .btn-group { display: flex; gap: 20px; justify-content: center; }
        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.4s ease;
        }
        .btn-login { background: #fff; color: #1e3c72; }
        .btn-register { background: transparent; color: #fff; border: 2px solid #fff; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1>📚 Smart Library</h1>
        <p>Your ultimate gateway to knowledge. Manage books, explore categories, and start your reading journey today.</p>
        <div class="btn-group">
            <a href="login.html" class="btn btn-login">Login</a>
            <a href="register.html" class="btn btn-register">Register</a>
        </div>
    </div>
</body>
</html>
